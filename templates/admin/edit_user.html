{% extends "base.html" %}
{% block title %}Edit User{% endblock %}

{% block content %}
<style>
    :root {
        --primary-color: #1a365d;
        --primary-light: #2c5282;
        --primary-dark: #0f1f3d;
        --secondary-color: #3182ce;
        --accent-color: #4299e1;
        --accent-light: #90cdf4;
        --success-color: #48bb78;
        --warning-color: #ed8936;
        --danger-color: #f56565;
        --light-bg: #f7fafc;
        --white: #ffffff;
        --text-primary: #2d3748;
        --text-secondary: #718096;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.24);
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 20px rgba(0, 0, 0, 0.15);
        --shadow-xl: 0 14px 28px rgba(0, 0, 0, 0.25), 0 10px 10px rgba(0, 0, 0, 0.22);
        --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        padding: 1rem;
        color: var(--text-primary);
    }

    .edit-user-container {
        max-width: 800px;
        margin: 0 auto;
        animation: fadeIn 0.8s ease-out;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
        color: var(--primary-color);
        position: relative;
        display: inline-block;
        animation: fadeInDown 0.8s ease-out;
    }

    h1::after {
        content: '';
        position: absolute;
        bottom: -10px;
        left: 0;
        width: 100px;
        height: 4px;
        background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        border-radius: 2px;
        animation: expandWidth 1.5s ease-out forwards;
    }

    /* Edit User Form */
    .edit-user-form {
        background: var(--white);
        border-radius: 20px;
        box-shadow: var(--shadow-xl);
        padding: 2.5rem;
        position: relative;
        overflow: hidden;
        animation: slideInUp 0.8s ease-out 0.2s both;
    }

    .edit-user-form::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        animation: gradient 3s ease infinite;
    }

    @keyframes gradient {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    .form-group {
        margin-bottom: 2rem;
        position: relative;
        animation: fadeInUp 0.8s ease-out;
        animation-fill-mode: both;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .form-group:nth-child(4) { animation-delay: 0.4s; }
    .form-group:nth-child(5) { animation-delay: 0.5s; }

    label {
        display: block;
        margin-bottom: 0.75rem;
        font-weight: 600;
        color: var(--text-primary);
        font-size: 1rem;
        transition: var(--transition);
        position: relative;
    }

    label::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        transition: width 0.3s ease;
    }

    .form-group:focus-within label {
        color: var(--secondary-color);
    }

    .form-group:focus-within label::after {
        width: 100%;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
        width: 100%;
        padding: 1rem 1.25rem;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        font-size: 1rem;
        font-family: inherit;
        transition: var(--transition);
        background-color: var(--light-bg);
        position: relative;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    select:focus {
        outline: none;
        border-color: var(--secondary-color);
        box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        background-color: var(--white);
        transform: translateY(-2px);
    }

    /* Custom Select Styling */
    .select-wrapper {
        position: relative;
    }

    .select-wrapper::after {
        content: '▼';
        position: absolute;
        right: 1.25rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.8rem;
        color: var(--text-secondary);
        pointer-events: none;
        transition: var(--transition);
    }

    .select-wrapper:focus-within::after {
        color: var(--secondary-color);
        transform: translateY(-50%) scale(1.1);
    }

    select {
        appearance: none;
        cursor: pointer;
        padding-right: 2.5rem;
    }

    /* Custom Checkbox Styling */
    .checkbox-wrapper {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: pointer;
        padding: 1rem;
        background: var(--light-bg);
        border-radius: 12px;
        transition: var(--transition);
    }

    .checkbox-wrapper:hover {
        background: linear-gradient(135deg, var(--light-bg), #e2e8f0);
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
    }

    .checkbox-wrapper input[type="checkbox"] {
        position: absolute;
        opacity: 0;
        cursor: pointer;
    }

    .custom-checkbox {
        width: 24px;
        height: 24px;
        background: var(--white);
        border: 2px solid var(--border-color);
        border-radius: 6px;
        position: relative;
        transition: var(--transition);
        flex-shrink: 0;
    }

    .checkbox-wrapper input[type="checkbox"]:checked ~ .custom-checkbox {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        border-color: var(--primary-color);
        animation: checkPulse 0.4s ease;
    }

    @keyframes checkPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }

    .custom-checkbox::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 7px;
        width: 6px;
        height: 12px;
        border: solid var(--white);
        border-width: 0 2px 2px 0;
        transform: rotate(45deg) scale(0);
        transition: transform 0.2s ease;
    }

    .checkbox-wrapper input[type="checkbox"]:checked ~ .custom-checkbox::after {
        transform: rotate(45deg) scale(1);
    }

    .checkbox-label {
        font-weight: 500;
        color: var(--text-primary);
        transition: var(--transition);
    }

    .checkbox-wrapper input[type="checkbox"]:checked ~ .checkbox-label {
        color: var(--primary-color);
        font-weight: 600;
    }

    /* Button Group */
    .button-group {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .button-primary,
    .button-secondary {
        flex: 1;
        padding: 1rem 1.5rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        text-decoration: none;
        text-align: center;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .button-primary {
        background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
        color: var(--white);
        box-shadow: var(--shadow-md);
    }

    .button-primary::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
    }

    .button-primary:hover::before {
        left: 100%;
    }

    .button-primary:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
        background: linear-gradient(135deg, var(--primary-light), var(--secondary-color));
    }

    .button-primary::after {
        content: '✓';
        font-size: 0.9rem;
    }

    .button-secondary {
        background: transparent;
        color: var(--primary-color);
        border: 2px solid var(--primary-color);
    }

    .button-secondary:hover {
        background: var(--primary-color);
        color: var(--white);
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
    }

    .button-secondary::after {
        content: '✕';
        font-size: 0.9rem;
    }

    /* Success Message */
    .success-message {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--success-color);
        color: var(--white);
        padding: 1rem 1.5rem;
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        transform: translateX(400px);
        transition: transform 0.5s ease;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .success-message.show {
        transform: translateX(0);
    }

    .success-message::before {
        content: '✓';
        font-size: 1.2rem;
        font-weight: bold;
    }

    /* Animations */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes expandWidth {
        from {
            width: 0;
            opacity: 0;
        }
        to {
            width: 100px;
            opacity: 1;
        }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .edit-user-container {
            padding: 0.5rem;
        }

        h1 {
            font-size: 2rem;
        }

        .edit-user-form {
            padding: 1.5rem;
        }

        .button-group {
            flex-direction: column;
        }

        .button-primary,
        .button-secondary {
            width: 100%;
        }
    }

    @media (max-width: 576px) {
        h1 {
            font-size: 1.75rem;
        }

        .edit-user-form {
            padding: 1rem;
        }
    }
</style>

<div class="edit-user-container">
    <h1>Edit User: {{ user.name }}</h1>
    
    <form action="{{ url_for('admin.edit_user', user_id=user.id) }}" method="POST" class="edit-user-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" value="{{ user.name or '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" required>
        </div>
        
        <div class="form-group">
            <label for="role">Role</label>
            <div class="select-wrapper">
                <select id="role" name="role">
                    <option value="client" {% if user.role == 'client' %}selected{% endif %}>Client</option>
                    <option value="lawyer" {% if user.role == 'lawyer' %}selected{% endif %}>Lawyer</option>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label for="password">New Password (leave blank to keep current)</label>
            <input type="password" id="password" name="password">
        </div>
        
        <div class="form-group">
            <label class="checkbox-wrapper">
                <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}>
                <span class="custom-checkbox"></span>
                <span class="checkbox-label">User is Active</span>
            </label>
        </div>
        
        <div class="button-group">
            <button type="submit" class="button-primary">Save Changes</button>
            <a href="{{ url_for('admin.manage_users') }}" class="button-secondary">Cancel</a>
        </div>
    </form>
</div>

<!-- Success Message (hidden by default) -->
<div class="success-message" id="success-message">
    User updated successfully!
</div>

<script>
    // Form submission with animation
    document.querySelector('.edit-user-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const saveButton = document.querySelector('.button-primary');
        const originalText = saveButton.innerHTML;
        
        // Show loading state
        saveButton.innerHTML = 'Saving...';
        saveButton.style.background = 'linear-gradient(135deg, var(--warning-color), #dd6b20)';
        saveButton.disabled = true;
        
        // Simulate API call (remove this in production)
        setTimeout(() => {
            // Reset button
            saveButton.innerHTML = 'Saved!';
            saveButton.style.background = 'linear-gradient(135deg, var(--success-color), #38a169)';
            
            // Show success message
            const successMessage = document.getElementById('success-message');
            successMessage.classList.add('show');
            
            // Hide success message after 3 seconds
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
            
            // Reset button after 2 seconds
            setTimeout(() => {
                saveButton.innerHTML = originalText;
                saveButton.style.background = '';
                saveButton.disabled = false;
            }, 2000);
        }, 1500);
    });
    
    // Add ripple effect to buttons
    document.querySelectorAll('.button-primary, .button-secondary').forEach(button => {
        button.addEventListener('click', function(e) {
            if (this.tagName === 'A') return; // Skip for links
            
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            
            this.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 600);
        });
    });
    
    // Add interactive checkbox animation
    document.querySelector('.checkbox-wrapper').addEventListener('click', function() {
        // Add a subtle bounce animation
        this.style.transform = 'scale(0.98)';
        setTimeout(() => {
            this.style.transform = '';
        }, 150);
    });
</script>

<style>
    /* Ripple effect for buttons */
    .ripple {
        position: absolute;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.5);
        transform: scale(0);
        animation: ripple-animation 0.6s ease-out;
        pointer-events: none;
    }
    
    @keyframes ripple-animation {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }
    
    /* Make buttons relative for ripple effect */
    .button-primary, .button-secondary {
        position: relative;
        overflow: hidden;
    }
</style>
{% endblock %}
